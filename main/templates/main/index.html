    <h2 class="question">Do you love me?</h2>
    <div class="button-container">
      <button class="yes-btn btn js-yes-btn">Yes</button>
      <button class="no-btn btn js-no-btn">No</button>
    </div>
  </div>

  <div class="loader-wrapper">
    <div class="cssload-heart"></div>

  <div class="result-container container">
    <video class="gif-result" src="{% static 'main/Love me.mp4' %}" autoplay loop></video>

    <a href="{% url 'gallery' %}" class="btn yes-btn"
